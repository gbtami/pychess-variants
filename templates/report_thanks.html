{% extends "template.html" %}
{% block content %}
<div id="main-wrap" class="report-wrap">
    <main class="page-small box box-pad report">
        <h1 class="box__top">Thanks for the report</h1>
        <p>Moderators will review it soon and take appropriate action.</p>
        {% if report_username %}
        <p>Reported user: <a class="user-link" href="/@/{{ report_username }}">{{ report_username }}</a></p>
        {% endif %}
        <div class="report-actions">
            <a href="/">Return to homepage</a>
        </div>
    </main>
</div>
{% endblock %}
{% block js %}
    <script src="{{ js }}"></script>
{% endblock %}
