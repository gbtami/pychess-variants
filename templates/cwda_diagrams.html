{% for army in cwda_army_diagrams %}
<section class="cwda-betza-army" aria-labelledby="cwda-betza-army-{{ loop.index }}">
    <h3 id="cwda-betza-army-{{ loop.index }}">{{ army.name }}</h3>
    <div class="catalogued-betza-grid">
        {% for diagram in army.diagrams %}
        <figure class="catalogued-betza-card">
            <figcaption>
                <strong title="{{ diagram.title }}">{{ diagram.title }}</strong>
                <code title="{{ diagram.betza }}">{{ diagram.betza }}</code>
            </figcaption>
            <div class="catalogued-betza-svg-wrap">
                {{ diagram.svg | safe }}
            </div>
        </figure>
        {% endfor %}
    </div>
</section>
{% endfor %}
<div class="catalogued-betza-legend" aria-label="Betza diagram legend">
    <span><i class="catalogued-betza-legend-move"></i>move</span>
    <span><i class="catalogued-betza-legend-capture"></i>capture</span>
    <span><i class="catalogued-betza-legend-both"></i>move or capture</span>
    <span><i class="catalogued-betza-legend-initial"></i>initial only</span>
    <span><i class="catalogued-betza-legend-hop"></i>hopper target</span>
</div>
